<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Our House</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/our-house/icons/favicon.ico" />
    <link rel="icon" type="image/png" href="/our-house/icons/favicon.png" />
    
    <!-- PWA Meta Tags -->
    <link rel="manifest" href="/our-house/manifest.json" />
    <meta name="theme-color" content="#3b82f6" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Our House" />
    <link rel="apple-touch-icon" href="/our-house/icons/apple-touch-icon.png" />
    
    <!-- Tailwind CSS CDN with custom font configuration -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          fontSize: {
            xs: ['0.875rem', { lineHeight: '1.25rem' }],  // 14px minimum for accessibility
            sm: ['0.9375rem', { lineHeight: '1.375rem' }],
            base: ['1rem', { lineHeight: '1.5rem' }],
            lg: ['1.125rem', { lineHeight: '1.75rem' }],
            xl: ['1.25rem', { lineHeight: '1.875rem' }],
            '2xl': ['1.5rem', { lineHeight: '2rem' }],
            '3xl': ['1.875rem', { lineHeight: '2.375rem' }],
          }
        }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
