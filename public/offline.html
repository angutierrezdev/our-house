<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Our House - Offline</title>
    <link rel="icon" type="image/x-icon" href="/our-house/icons/favicon.ico" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
        color: #333;
      }
      .container {
        background: white;
        border-radius: 24px;
        padding: 48px 32px;
        max-width: 480px;
        width: 100%;
        text-align: center;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      }
      .icon {
        width: 96px;
        height: 96px;
        margin: 0 auto 24px;
        background: #f3f4f6;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .icon svg {
        width: 48px;
        height: 48px;
        color: #6b7280;
      }
      h1 {
        font-size: 28px;
        font-weight: 700;
        margin-bottom: 16px;
        color: #1f2937;
      }
      p {
        font-size: 16px;
        color: #6b7280;
        line-height: 1.6;
        margin-bottom: 32px;
      }
      .button {
        display: inline-block;
        background: #3b82f6;
        color: white;
        padding: 14px 32px;
        border-radius: 12px;
        text-decoration: none;
        font-weight: 600;
        transition: background 0.2s;
        border: none;
        font-size: 16px;
        cursor: pointer;
      }
      .button:hover {
        background: #2563eb;
      }
      .status {
        margin-top: 24px;
        padding: 12px 20px;
        background: #fef3c7;
        color: #92400e;
        border-radius: 8px;
        font-size: 14px;
        display: inline-block;
      }
      .status.online {
        background: #d1fae5;
        color: #065f46;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M2 13a2 2 0 0 0 2-2V7a2 2 0 0 1 4 0v13a2 2 0 0 0 4 0V4a2 2 0 0 1 4 0v13a2 2 0 0 0 4 0v-4a2 2 0 0 1 2-2h0" stroke-dasharray="1,4" stroke-dashoffset="1">
            <animate attributeName="stroke-dashoffset" values="1;0" dur="1.5s" repeatCount="indefinite"/>
          </path>
        </svg>
      </div>
      <h1>You're Offline</h1>
      <p>
        It looks like you've lost your internet connection. Don't worry—you can still view cached data. 
        Once you're back online, everything will sync automatically.
      </p>
      <button class="button" onclick="window.location.reload()">Try Again</button>
      <div id="status" class="status">
        Checking connection...
      </div>
    </div>

    <script>
      function updateOnlineStatus() {
        const statusEl = document.getElementById('status');
        if (navigator.onLine) {
          statusEl.textContent = 'You are back online!';
          statusEl.className = 'status online';
          setTimeout(() => {
            window.location.href = '/our-house/';
          }, 1500);
        } else {
          statusEl.textContent = 'No internet connection';
          statusEl.className = 'status';
        }
      }

      window.addEventListener('online', updateOnlineStatus);
      window.addEventListener('offline', updateOnlineStatus);
      
      // Initial check
      updateOnlineStatus();
      
      // Periodic check every 3 seconds
      setInterval(updateOnlineStatus, 3000);
    </script>
  </body>
</html>
